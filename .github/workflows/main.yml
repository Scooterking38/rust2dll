name: Build Rust DLL

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build DLL (release)
        run: cargo build --release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-dll
          path: target/release/*.dll
